<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap">
    <style>
        /* Your CSS styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .separator-horizontal {
            height: 2px;
            background: white;
            width: 100%;
            margin: 10px 0;
        }

        .nav-links {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #007bff;
        }

        .nav-links .dropdown {
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: #333;
            color: white;
            min-width: 120px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            z-index: 1;
            padding: 10px;
        }

        .dropdown-content a {
            color: white;
            text-decoration: none;
            padding: 8px;
            display: block;
        }

        .dropdown-content a:hover {
            color: #007bff;
        }

        .nav-links .dropdown:hover .dropdown-content {
            display: block;
        }

        .portfolio-container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .masonry-grid {
            column-count: 3;
            column-gap: 20px;
        }

        .portfolio-item {
            break-inside: avoid;
            margin-bottom: 20px;
        }

        .portfolio-item img {
            width: 100%;
            height: auto;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .portfolio-item img:hover {
            transform: scale(1.05);
        }

        .contact-box {
            background: #ccc;
            padding: 40px;
            text-align: center;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .contact-button a {
            padding: 12px 24px;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.1em;
            transition: background-color 0.3s;
        }

        .contact-button a:hover {
            background: #444;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .masonry-grid {
                column-count: 2;
            }

            .nav-links {
                flex-direction: column;
                gap: 10px;
            }

            .dropdown-content {
                position: static;
                box-shadow: none;
            }
        }

        @media (max-width: 480px) {
            .masonry-grid {
                column-count: 1;
            }

            .nav-links {
                gap: 5px;
            }

            .contact-box {
                padding: 30px;
            }

            .contact-button a {
                padding: 10px 20px;
            }
        }
    </style>
</head>
