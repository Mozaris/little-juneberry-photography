<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photography Portfolio - Little Juneberry Photography</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- Font Awesome -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"> <!-- Google Fonts -->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif; /* Consistent font across pages */
            background: #f5f5f5; /* Light gray background */
        }

        /* Header styling */
        .header-container {
            background: #333; /* Dark background */
            color: white; /* White text */
            padding: 20px; /* Padding around the content */
            text-align: center; /* Centered content */
        }

        .separator-horizontal {
            height: 2px;
            background: white;
            width: 100%;
            margin: 10px 0; /* Space around the separator */
        }

        .nav-links {
            list-style-type: none; /* No bullets */
            padding: 0;
            margin: 0;
            display: flex; /* Horizontal menu */
            justify-content: center; /* Center the navigation */
            gap: 20px; /* Even spacing between links */
            position: relative; /* Position context for dropdown */
        }

        .nav-links a {
            text-decoration: none; /* No underlines */
            color: white; /* White text */
            transition: color 0.3s; /* Smooth hover effect */
        }

        .nav-links a:hover {
            color: #007bff; /* Highlight color on hover */
        }

        .nav-links .dropdown {
            position: relative; /* Required for dropdown positioning */
        }

        .dropdown-content {
            display: none; /* Hidden by default */
            position: absolute; /* Absolute positioning */
            background: #333; /* Same as header background */
            color: white; /* Same as text color */
            min-width: 120px; /* Minimum width for dropdown */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* Subtle shadow */
            border-radius: 5px; /* Rounded corners */
            z-index: 1; /* Ensures it appears above other elements */
            padding: 10px; /* Padding for dropdown */
        }

        .dropdown-content a {
            text-decoration: none; /* No underlines */
            color: white; /* White text */
            display: block; /* Make each link a block */
            padding: 8px; /* Padding for links */
            transition: color 0.3s; /* Smooth hover effect */
        }

        .dropdown-content a:hover {
            color: #007bff; /* Highlight color on hover */
        }

        .nav-links .dropdown:hover .dropdown-content {
            display: block; /* Show the dropdown on hover */
        }

        .portfolio-container {
            max-width: 1200px; /* Fixed width for layout consistency */
            margin: auto; /* Center the container */
            padding: 20px; /* Padding around the content */
            background-color: white; /* White background for contrast */
            border-radius: 10px; /* Rounded corners */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* Subtle shadow */
        }

        .masonry-grid {
            column-count: 3; /* Masonry layout with 3 columns */
            column-gap: 20px; /* Gap between columns */
        }

        .portfolio-item {
            break-inside: avoid; /* Prevent breaking within portfolio items */
            margin-bottom: 20px; /* Vertical spacing */
        }

        .portfolio-item img {
            width: 100%; /* Full width */
            height: auto; /* Maintain aspect ratio */
            object-fit: cover; /* Cover the space */
            transition: transform 0.3s; /* Smooth hover effect */
        }

        .portfolio-item img:hover {
            transform: scale(1.05); /* Zoom effect on hover */
        }

        .contact-box {
            background: #ccc; /* Light gray background for contrast */
            padding: 40px; /* Extra padding for the contact section */
            text-align: center; /* Centered content */
            margin-top: 20px; /* Separate from portfolio items */
            border-radius: 10px; /* Rounded corners */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* Subtle shadow */
        }

        .contact-button a {
            padding: 12px 24px; /* Padding for the button */
            background: #333; /* Dark background */
            color: white; /* White text */
            border: none; /* No border */
            border-radius: 5px; /* Rounded corners */
            text-decoration: none; /* No underlines */
            font-size: 1.1em; /* Slightly larger font */
            transition: background-color 0.3s; /* Smooth hover effect */
        }

        .contact-button a:hover {
            background: #444; /* Darker on hover */
        }

        footer {
            background: #333; /* Dark background */
            color: white; /* White text */
            text-align: center; /* Centered content */
            padding: 20px; /* Padding around the content */
        }

        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            .masonry-grid {
                column-count: 2; /* Reduce to two columns for smaller screens */
            }

            .nav-links {
                flex-direction: column; /* Vertical navigation */
                gap: 10px; /* Reduced spacing for smaller screens */
            }

            .dropdown-content {
                position: static; /* Adjust dropdown positioning */
                box-shadow: none; /* Remove shadow for narrower screens */
            }
        }

        @media (max-width: 480px) {
            .masonry-grid {
                column-count: 1; /* Single column for narrower screens */
            }

            .nav-links {
                gap: 5px; /* Further reduced spacing */
            }

            .contact-box {
                padding: 30px; /* Reduced padding for smaller screens */
            }

            .contact-button a {
                padding: 10px 20px; /* Smaller button for narrower screens */
            }
        }
    </style>
</head>
<body>

</body>
